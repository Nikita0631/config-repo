server:
  port: 8880

spring:
  application:
    name: config-service

  cloud:
    config:
      server:
        git:
          uri: https://github.com/Nikita0631/config-repo
          clone-on-start: true

global:
  message: Microservices Environment!

logging:
  level:
    root: INFO

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health, info, refresh
  endpoint:
    health:
      show-details: always
